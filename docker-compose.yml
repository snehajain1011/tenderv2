services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: procurement_ai
      POSTGRES_USER: procurement
      POSTGRES_PASSWORD: procurement
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    image: python:3.13-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn api:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://procurement:procurement@postgres:5432/procurement_ai
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /app/workspaces
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    image: python:3.13-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python worker.py"
    environment:
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: local
      LOCAL_STORAGE_ROOT: /app/workspaces
    volumes:
      - .:/app
    depends_on:
      - redis

  frontend:
    image: node:20
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
